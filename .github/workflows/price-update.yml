name: price-update

on:
  schedule:
    # 每 3 天一次:每月 1/4/7/…/28 号 UTC 19:23(北京时间约次日 03:23),错开整点
    - cron: "23 19 */3 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install -e ".[vision]"
          python -m playwright install --with-deps chromium

      - name: Run scraping pipeline
        env:
          MPH_USE_PLAYWRIGHT: "1"
          MPH_VISION_MODEL: "claude-sonnet-4-6"
          # 视觉主源需凭据;在仓库 Secrets 配置这两项(缺失则视觉源跳过、正则兜底)
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: python -m app.pipeline.runner

      - name: Commit updated snapshot
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add data/snapshots data/latest.json
          if git diff --cached --quiet; then
            echo "无价格变动,跳过提交。"
          else
            git commit -m "chore: 价格更新 $(date -u +%F)"
            git push
          fi
